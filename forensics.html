<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forensics Results</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="header">
    <h1>🔬 Forensics Results</h1>
    <a href="/" class="btn btn-primary">← Back to Dashboard</a>
  </div>
  <div class="container">
    <div class="step-box">
      <h2>Evidence Data</h2>
      <pre id="evidence-data">Loading...</pre>
    </div>
  </div>
  <script>
    fetch('/api/session-status')
      .then(res => res.json())
      .then(data => {
        document.getElementById('evidence-data').innerText = 
          JSON.stringify(data, null, 2);
      });
  </script>
</body>
</html>
